services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: lingo_sketch
    volumes:
      - lingo_sketch_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d lingo_sketch"]
      interval: 2s
      timeout: 5s
      retries: 15

volumes:
  lingo_sketch_pg:
